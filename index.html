<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Calçados Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #7d0000; /* Vermelho bordô mais elegante */
            --text-color: #ffffff;
            --border-style: 1px solid rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Logo corrigida */
        .header-logo {
            width: 160px;
            margin-bottom: 30px;
        }

        /* Banner Principal - Agora com proporção de site */
        .main-banner {
            width: 100%;
            height: 220px;
            background: url('banner.jpg') center/cover no-repeat, #222; 
            border-radius: 4px;
            margin-bottom: 30px;
            border: var(--border-style);
        }

        h1 {
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* Links Estilo Minimalista */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--card-bg);
            border: var(--border-style);
            padding: 16px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .link-card:hover {
            background: #252525;
            border-color: rgba(255,255,255,0.4);
        }

        /* Botão VIP mais discreto e elegante */
        .link-card.vip {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
        }

        .link-card.vip:hover {
            background: var(--accent-color);
            color: white;
        }

        .link-card i {
            position: absolute;
            left: 20px;
            font-size: 1rem;
        }

        /* Texto Conheça a Marca */
        .brand-text {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.7;
            border-top: var(--border-style);
        }

        .socials {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .socials a {
            color: white;
            font-size: 1.2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- LOGO: Se não carregar, ele mostrará o texto elegante -->
    <img src="https://ferraracalcados.com.br/wp-content/uploads/2023/04/logo-ferrara.png" alt="FERRARA" class="header-logo">

    <!-- BANNER: Espaço para a foto que você me mandou -->
    <div class="main-banner"></div>

    <h1>Ferrara</h1>

    <div class="links-group">
        <a href="https://ferraracalcados.com.br" class="link-card" target="_blank">
            <i class="fas fa-shopping-bag"></i>
            Site Oficial
        </a>

        <a href="https://wa.me/5516999999999" class="link-card vip" target="_blank">
            <i class="fab fa-whatsapp"></i>
            Atendimento VIP
        </a>

        <a href="https://ferraracalcados.com.br/categoria/casual/" class="link-card" target="_blank">
            <i class="fas fa-shoe-prints"></i>
            Coleção Casual
        </a>

        <a href="https://ferraracalcados.com.br/categoria/social/" class="link-card" target="_blank">
            <i class="fas fa-chevron-right"></i>
            Linha Social
        </a>
    </div>

    <div class="brand-text">
        <p>Não importa o destino, use Ferrara.<br>Conforto e sofisticação em cada passo.</p>
    </div>

    <div class="socials">
        <a href="https://www.instagram.com/ferraracalcados/"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
    </div>
</div>

</body>
</html>
