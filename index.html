<!DOCTYPE html>
<html lang="pt-br">
<head>

    <style>
        /* RESET TOTAL PARA ELIMINAR O LAYOUT ANTIGO */

            background-color: #000 !important; 
            font-family: 'Helvetica', Arial, sans-serif;

            margin-bottom: 12px;

            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-vip { background: #4a0000 !important; border-color: #6a0000 !important; }
        .btn:hover { background: #222; }

        .footer-text { font-size: 12px; color: #666; margin-top: 30px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <img src="LINK_DA_SUA_LOGO_AQUI.png" class="logo" alt="FERRARA">
