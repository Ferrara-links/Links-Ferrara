<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Calçados Premium</title>
    <!-- Fontes de Alta Performance -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #bc0000; /* Vermelho Identidade Ferrara */
            --bg-black: #000000;
            --card-bg: #0a0a0a;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg-black);
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO - Tratamento Dinâmico Senior */
        /* Este bloco força logos com fundo branco a ficarem transparentes e brancas */
        .logo-wrapper {
            width: 220px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .logo-img {
            width: 100%;
            height: auto;
            /* O SEGREDO: Remove fundo branco e inverte preto para branco */
            filter: brightness(0) invert(1); 
            mix-blend-mode: screen;
        }

        /* HERO BANNER - Estilo Vitrine de Luxo */
        .hero-banner {
            width: 100%;
            height: 260px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.9) 100%), 
                        url('banner.jpg') center/cover no-repeat;
            border-radius: 4px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .hero-banner span {
            font-size: 0.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
        }

        /* BOTÕES - Design Dinâmico e Moderno */
        .links-stack {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            width: 100%;
            padding: 22px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--primary-color);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 4px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .btn:hover {
            background: var(--primary-color);
            color: var(--bg-black);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        /* Botão Destaque - Atendimento VIP */
        .btn-vip {
            border-color: var(--accent-color);
            color: #ff4d4d;
            background: rgba(188, 0, 0, 0.05);
        }

        .btn-vip:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .btn i {
            position: absolute;
            left: 24px;
            font-size: 1rem;
        }

        /* SEÇÃO SOBRE - Layout Dinâmico */
        .about-section {
            margin-top: 60px;
            padding: 30px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .about-section h2 {
            font-size: 0.7rem;
            letter-spacing: 6px;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .about-section p {
            font-size: 0.85rem;
            line-height: 1.8;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
        }

        /* FOOTER */
        .footer-socials {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .footer-socials a {
            color: white;
            font-size: 1.5rem;
            transition: var(--transition);
            opacity: 0.4;
        }

        .footer-socials a:hover {
            opacity: 1;
            color: var(--accent-color);
            transform: scale(1.2);
        }

        .copy {
            margin-top: 40px;
            font-size: 0.55rem;
            letter-spacing: 3px;
            opacity: 0.2;
            text-transform: uppercase;
        }

        /* Animação de Entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { animation: fadeIn 1s ease-out; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo tratada por código -->
        <div class="logo-wrapper">
            <img src="logo.png" alt="FERRARA" class="logo-img" onerror="this.src='logo.jpg'">
        </div>

        <!-- Banner Profissional -->
        <div class="hero-banner">
            <span>Conforto em cada passo</span>
        </div>

        <!-- Links Oficiais -->
        <div class="links-stack">
            <a href="https://ferraracalcados.com.br" class="btn" target="_blank">
                <i class="fa-solid fa-bag-shopping"></i> Site Oficial
            </a>

            <!-- WHATSAPP: Troque o número abaixo -->
            <a href="https://wa.me/5516999999999" class="btn btn-vip" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> Atendimento VIP
            </a>

            <a href="https://ferraracalcados.com.br/categoria/casual/" class="btn" target="_blank">
                <i class="fa-solid fa-shoe-prints"></i> Linha Casual
            </a>

            <a href="https://ferraracalcados.com.br/categoria/social/" class="btn" target="_blank">
                <i class="fa-solid fa-chevron-right"></i> Linha Social
            </a>
        </div>

        <!-- Conheça a Marca -->
        <div class="about-section">
            <h2>A Marca Ferrara</h2>
            <p>Não importa o destino, use Ferrara. Criamos calçados que unem a sofisticação do design contemporâneo com o máximo conforto. Alcance o próximo nível.</p>
        </div>

        <!-- Social -->
        <div class="footer-socials">
            <a href="https://www.instagram.com/ferraracalcados/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://ferraracalcados.com.br" target="_blank"><i class="fa-solid fa-globe"></i></a>
        </div>

        <div class="copy">Ferrara © 2024 - Todos os direitos reservados</div>
    </div>

</body>
</html>
