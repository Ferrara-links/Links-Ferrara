<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Links Oficiais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; font-family: 'Montserrat', sans-serif; color: #fff; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 50px 25px; text-align: center; }
        
        /* LOGO COM FILTRO PARA FICAR BRANCA E VERMELHA */
        .logo-img { 
            width: 220px; 
            margin-bottom: 40px; 
            /* Esse filtro transforma o preto da sua logo original em branco no site! */
            filter: brightness(0) invert(1) drop-shadow(0 0 5px rgba(255,255,255,0.2)); 
        }

        .banner {
            width: 100%;
            height: 220px;
            background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 50%), 
                        url('https://ferraracalcados.com.br/wp-content/uploads/2023/11/banner-desktop-tokio-all-black.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 35px;
            border: 1px solid #222;
        }

        .links-wrapper { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            background: #111;
            border: 1px solid #333;
            padding: 18px;
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
            border-radius: 4px;
        }

        .btn:hover { background: #fff; color: #000; border-color: #fff; }

        .btn-vip {
            border: 1px solid #bc0000;
            color: #ff4d4d;
        }
        .btn-vip:hover { background: #bc0000; color: #fff; }

        .footer-tagline { margin-top: 50px; font-size: 0.7rem; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; }
        .social-icons { margin-top: 25px; display: flex; justify-content: center; gap: 30px; }
        .social-icons a { color: #fff; font-size: 1.3rem; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <!-- Usando a logo original do seu site, mas com filtro que eu criei para ficar branca -->
    <img src="https://ferraracalcados.com.br/wp-content/uploads/2023/04/logo-ferrara.png" alt="FERRARA" class="logo-img">

    <div class="banner"></div>

    <div class="links-wrapper">
        <a href="https://ferraracalcados.com.br" class="btn" target="_blank">Loja Online</a>
        
        <!-- COLOQUE SEU WHATSAPP AQUI -->
        <a href="https://wa.me/5516999999999" class="btn btn-vip" target="_blank">
            <i class="fab fa-whatsapp"></i> Atendimento VIP
        </a>
        
        <a href="https://ferraracalcados.com.br/categoria/casual/" class="btn" target="_blank">Coleção Casual</a>
        <a href="https://ferraracalcados.com.br/categoria/social/" class="btn" target="_blank">Linha Social</a>
    </div>

    <div class="footer-tagline">Ferrara &copy; 2024</div>

    <div class="social-icons">
        <a href="https://www.instagram.com/ferraracalcados/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://ferraracalcados.com.br" target="_blank"><i class="fas fa-globe"></i></a>
    </div>
</div>

</body>
</html>
