<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Estilo e Conforto</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000000;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Logo: O código abaixo remove o fundo branco e deixa a logo clara */
        .logo-box {
            margin-bottom: 30px;
            mix-blend-mode: screen; /* Remove o fundo preto/branco automaticamente */
        }
        
        .logo-img {
            width: 200px;
            filter: brightness(0) invert(1); /* Transforma o preto em branco */
        }

        /* Banner Profissional com a sua foto */
        .banner-card {
            width: 100%;
            height: 240px;
            background: url('banner.jpg') center/cover no-repeat;
            border-radius: 4px;
            margin-bottom: 30px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: #000;
            border: 1px solid #222;
            padding: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.02);
        }

        /* Botão VIP: Bordô Ferrara */
        .btn-vip {
            border: 1px solid #800000;
            color: #ff4d4d;
        }

        .btn-vip:hover {
            background: #800000;
            color: #fff;
        }

        .brand-info {
            margin-top: 50px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.4;
            line-height: 2;
        }

        .social-row {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-row a {
            color: #fff;
            font-size: 1.2rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <!-- Puxando a logo que você subiu no GitHub -->
        <img src="logo.png" alt="Ferrara" class="logo-img">
    </div>

    <!-- Puxando o banner que você subiu no GitHub -->
    <div class="banner-card"></div>

    <div class="links-group">
        <a href="https://ferraracalcados.com.br" class="btn">Visitar Site Oficial</a>
        
        <!-- AJUSTE SEU WHATSAPP AQUI -->
        <a href="https://wa.me/5516999999999" class="btn btn-vip">
            <i class="fab fa-whatsapp"></i> Atendimento VIP
        </a>
        
        <a href="https://ferraracalcados.com.br/categoria/casual/" class="btn">Linha Casual</a>
        <a href="https://ferraracalcados.com.br/categoria/social/" class="btn">Linha Social</a>
    </div>

    <div class="brand-info">
        The Next Level Footwear<br>
        Ferrara &copy; 2024
    </div>

    <div class="social-row">
        <a href="https://www.instagram.com/ferraracalcados/"><i class="fab fa-instagram"></i></a>
        <a href="https://ferraracalcados.com.br"><i class="fas fa-shopping-bag"></i></a>
    </div>
</div>

</body>
</html>
