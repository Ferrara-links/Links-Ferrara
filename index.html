<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Conforto em cada passo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #bc0000; /* Vermelho dos detalhes do site */
            --bg-dark: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: var(--primary);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1549298916-b41d501d3772?q=80&w=2012&auto=format&fit=crop'); /* Fundo sutil */
            background-size: cover;
            background-position: center;
            padding: 40px 20px;
            text-align: center;
        }

        /* Logo Premium */
        .logo {
            width: 180px;
            margin-bottom: 30px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        /* Banner Hero */
        .hero-card {
            width: 100%;
            height: 200px;
            border-radius: 20px;
            background: url('https://ferraracalcados.com.br/wp-content/uploads/2023/11/banner-desktop-tokio-all-black.jpg') center/cover;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .tagline {
            font-weight: 300;
            font-size: 0.85rem;
            margin-bottom: 40px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Botões Estilo Site Ferrara */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-item {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .link-item:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.02);
        }

        .link-item.special {
            background: var(--accent);
            border: none;
            animation: pulse 2s infinite;
        }

        .link-item i {
            position: absolute;
            left: 20px;
            font-size: 1.1rem;
        }

        /* Seção "Sobre" Dinâmica */
        .about-section {
            margin-top: 50px;
            padding: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .about-section h2 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .about-section p {
            font-size: 0.85rem;
            line-height: 1.6;
            opacity: 0.7;
            font-weight: 300;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(188, 0, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(188, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0px rgba(188, 0, 0, 0); }
        }

        .social-footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-footer a {
            color: white;
            font-size: 1.4rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .social-footer a:hover {
            opacity: 1;
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Substituí por uma imagem de logo genérica clara, você pode subir a sua logo-ferrara.png -->
    <img src="https://ferraracalcados.com.br/wp-content/uploads/2023/04/logo-ferrara.png" alt="Ferrara Logo" class="logo">

    <div class="hero-card">
        <!-- O fundo deste card é o Banner do site -->
    </div>

    <h1>Ferrara</h1>
    <p class="tagline">CONFORTO EM CADA PASSO</p>

    <div class="links-container">
        <a href="https://ferraracalcados.com.br" class="link-item" target="_blank">
            <i class="fas fa-shopping-bag"></i>
            Loja Online
        </a>

        <!-- COLOQUE SEU WHATSAPP AQUI -->
        <a href="https://wa.me/5516999999999" class="link-item special" target="_blank">
            <i class="fab fa-whatsapp"></i>
            Atendimento VIP
        </a>

        <a href="https://ferraracalcados.com.br/categoria/casual/" class="link-item" target="_blank">
            <i class="fas fa-shoe-prints"></i>
            Linha Casual
        </a>

        <a href="#conheca" class="link-item">
            <i class="fas fa-star"></i>
            Conheça a Marca
        </a>
    </div>

    <div id="conheca" class="about-section">
        <h2>A ESSÊNCIA FERRARA</h2>
        <p>Não importa o destino, use Ferrara. Criamos calçados que unem a sofisticação do design contemporâneo com o máximo conforto para o seu dia a dia. Alcance o próximo nível.</p>
    </div>

    <div class="social-footer">
        <a href="https://www.instagram.com/ferraracalcados/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook"></i></a>
    </div>
</div>

</body>
</html>
