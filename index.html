<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrara | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #bc0000;
            --bg: #050505;
            --card: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO - TRATAMENTO DE ALTO NÍVEL */
        .logo-container {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            /* O truque abaixo remove o fundo branco da imagem e inverte a cor preta para branco */
            filter: brightness(0) invert(1);
            mix-blend-mode: lighten;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            object-fit: contain;
        }

        /* BANNER */
        .banner {
            width: 100%;
            height: 240px;
            background: url('banner.jpg') center/cover no-repeat;
            border-radius: 12px;
            margin-bottom: 35px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        /* LINKS */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 20px;
            background: var(--card);
            border: 1px solid #222;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s all ease;
            position: relative;
        }

        .btn:hover {
            border-color: #555;
            background: #1a1a1a;
            transform: translateY(-2px);
        }

        .btn-wa {
            border: 1px solid var(--accent);
            color: #ff4d4d;
        }

        .btn-wa:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn i {
            position: absolute;
            left: 20px;
            font-size: 1.1rem;
        }

        /* TEXTO */
        .footer-info {
            margin-top: 50px;
            text-align: center;
        }

        .footer-info h2 {
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .footer-info p {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.6;
            font-weight: 400;
        }

        .social {
            margin-top: 40px;
            display: flex;
            gap: 25px;
        }

        .social a {
            color: #fff;
            font-size: 1.4rem;
            opacity: 0.4;
            transition: 0.3s;
        }

        .social a:hover { opacity: 1; }

        .copyright {
            margin-top: 40px;
            font-size: 0.5rem;
            opacity: 0.2;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <!-- Suba sua logo original mesmo, o código acima limpa ela -->
        <img src="logo.png" alt="FERRARA" class="logo-img">
    </div>

    <div class="banner"></div>

    <div class="links">
        <a href="https://ferraracalcados.com.br" class="btn" target="_blank">
            <i class="fa-solid fa-cart-shopping"></i> Loja Online
        </a>

        <a href="https://wa.me/5516999999999" class="btn btn-wa" target="_blank">
            <i class="fa-brands fa-whatsapp"></i> Atendimento VIP
        </a>

        <a href="https://ferraracalcados.com.br/categoria/casual/" class="btn" target="_blank">
            <i class="fa-solid fa-shoe-prints"></i> Linha Casual
        </a>

        <a href="https://ferraracalcados.com.br/categoria/social/" class="btn" target="_blank">
            <i class="fa-solid fa-chevron-right"></i> Linha Social
        </a>
    </div>

    <div class="footer-info">
        <h2>Ferrara Footwear</h2>
        <p>Sofisticação italiana, essência brasileira.<br>O próximo nível do seu estilo.</p>
    </div>

    <div class="social">
        <a href="https://www.instagram.com/ferraracalcados/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://ferraracalcados.com.br" target="_blank"><i class="fa-solid fa-globe"></i></a>
    </div>

    <div class="copyright">FERRARA &copy; 2024</div>
</div>

</body>
</html>
