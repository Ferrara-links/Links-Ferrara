<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FERRARA VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-red: #4a0000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border-color: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* HEADER - LOGO TRANSPARENTE */
        .logo-header {
            padding: 30px 0;
        }
        .logo-header img {
            width: 180px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.1));
        }

        /* IMAGE DESTAQUE - PROPORÇÃO PREMIUM */
        .featured-image {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }
        .featured-image:hover { transform: scale(1.02); }

        /* LINKS STACK */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: white;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: #1a1a1a;
            border-color: #444;
        }

        /* BOTÃO DESTAQUE VIP (MAIOR CONVERSÃO) */
        .link-item.vip {
            background: var(--accent-red);
            border-color: #600000;
        }
        .link-item.vip:hover {
            background: #600000;
        }

        /* TEXTO E FOOTER */
        .mission-text {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .social-icons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: var(--text-dim);
            font-size: 22px;
            transition: 0.3s;
        }

        .social-icons a:hover { color: white; }

        .footer-tag {
            margin-top: 40px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #333;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="logo-header">
            <img src="URL_DA_SUA_LOGO_TRANSPARENTE.png" alt="FERRARA">
        </header>

        <img src="URL_DA_FOTO_PREMIUM_TOKIO.jpg" alt="Ferrara Tokio" class="featured-image">

        <div class="links-stack">
            <a href="https://ferrara.com.br" class="link-item">
                Site Oficial <i class="fas fa-arrow-right"></i>
            </a>

            <a href="https://wa.me/SEUNUMERO" class="link-item vip">
                Atendimento VIP <i class="fab fa-whatsapp"></i>
            </a>

            <a href="#" class="link-item">
                Linha Casual <i class="fas fa-shoe-prints"></i>
            </a>

            <a href="#" class="link-item">
                Linha Social <i class="fas fa-chevron-right"></i>
            </a>
        </div>

        <div class="mission-text">
            <strong>FERRARA FOOTWEAR</strong><br>
            A união entre o design italiano e a alma brasileira.<br>
            Conforto absoluto em cada detalhe.
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fas fa-globe"></i></a>
        </div>

        <div class="footer-tag">The Next Level Experience</div>
    </div>

</body>
</html>
